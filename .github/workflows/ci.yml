name: CI

on:
  push:
    branches: [master, devel]
  pull_request:
    branches: [master, devel]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  host:
    name: Host workspace (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rust-src, llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build host packages
        run: cargo build --verbose

      - name: Test host packages
        run: cargo test --verbose

  kernel:
    name: Kernel + guests (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: aarch64-unknown-none
          components: rust-src, llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            kernel -> kernel/target
            userspace/guest -> userspace/guest/target

      - name: Build kernel, guests, initrd
        run: bash scripts/build-kernel.sh

      - name: Upload boot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: auraos-qemu-boot
          path: |
            build/aura-kernel.bin
            build/initrd.cpio
            kernel/target/aarch64-unknown-none/release/aura-kernel
          if-no-files-found: error
