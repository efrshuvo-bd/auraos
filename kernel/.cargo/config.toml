# Portable defaults for Linux/CI. On Windows WDAC, run scripts/fix-linker.ps1
# to point at VS LLVM ld.lld (absolute paths).
# Linker script path is set by build-kernel.sh / fix-linker.ps1 (absolute -T),
# because rust-lld may not resolve a relative -T when target-dir is used.
[target.aarch64-unknown-none]
linker = "rust-lld"
